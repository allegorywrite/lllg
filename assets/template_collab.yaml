# "&lg_vs_gg":  # キー名は & で始める。グラフファイル名や凡例に使用。
#   properties:
#     - lg
#     - gg
# lg:  # ローカルガイダンスを使用するかどうか
#   - true
#   - false
# gg:  # グローバルガイダンスを使用するかどうか
#   - false
#   - true

# "&lg_collision_cost_vs_lg_collision_cost_order":
#   properties:
#     # - lg_global_guide_first_order
#     # - lg_global_guide_second_order
#     - lg_collision_cost
#     - lg_collision_cost_order

use_sipp:  # SIPを使用するかどうか
  - false

lg:  # ローカルガイダンスを使用するかどうか
  - true

gg:  # グローバルガイダンスを使用するかどうか
  - false

lg_collision_cost:  # 衝突コスト
  - 1.5
  - 0.5
  # - 0.0
  # - 0.1
  # - 1.0

lg_collision_cost_order:  # 衝突コストの係数
  - 1e-7
  - 1e-5
  # - 1e-3
  # - 1e-1

# lg_global_guide_first_order:  # グローバルガイダンスの係数
#   - 1.0
#   - 1e-2
#   - 1e-4
#   - 0.0

# lg_global_guide_second_order:  # グローバルガイダンスの係数
#   - 1.0
#   - 1e-2
#   - 1e-4
#   - 0.0

lg_window:  # Windowサイズ
  - 6
  # - 2
  # - 4
  # - 6
  # - 8
  # - 10
  # - 12
  # - 14
  # - 16

# プロット設定
plot_settings:
  mode: "violin"  # "scatter" (デフォルト) または "violin"
  violin_params:
    y_axis: "soc_normalized"       # y軸に使用する指標 ("soc", "soc_normalized", "runtime")
    orient: "vertical"  # "vertical" または "horizontal"

# 他のプロット設定例:
# plot_settings:
#   mode: "scatter"  # デフォルトの散布図プロット
#
# plot_settings:
#   mode: "violin"
#   violin_params:
#     y_axis: "soc_normalized" # 正規化SOCを使用
#     orient: "horizontal"     # 横向きバイオリンプロット
#
# バイオリンプロットについて:
# - x軸には自動的に各パラメータのケース（値）が表示されます
# - 複数の値を持つ各パラメータに対してそれぞれバイオリンプロットが作成されます
# - コラボレーション定義がある場合はその組み合わせもプロットされます