  gg: false
baseline_with_gg:
  lg: false
  gg: true

"&window_pruning_rate_collab": 
  properties:
    - lg_window
    - lg_pruning_rate

# LG parameters
lg: true
gg: false
lg_window: [4, 8, 12, 16, 20]
# lg_window: [8, 20]
