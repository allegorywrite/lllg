N: 1000
v: 3
S: 100

"&lg_window_lg_num_refine_collab": 
  properties:
    - lg_window
    - lg_num_refine

# LG parameters
lg: true
lifelong: true
lg_window: [1, 5, 10, 15, 20]
lg_num_refine: [0, 1, 2, 3]

time_limit_sec: 20

# Plot settings
plot_settings:
  mode: violin
  line: lg_num_refine
  hide_scatter: true
  hide_data_label: true
  violin_params:
    y_axis: throughput_tasks
    x_axis: lg_window
    title: title
    x_label: x_label
    x_type: int
    y_label: y_label
    orient: vertical